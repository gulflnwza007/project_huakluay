<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - Health Tracker</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .register-container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.4rem; color: #555; font-size: 0.9rem; }
        input { width: 100%; padding: 0.7rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { width: 100%; padding: 0.8rem; background-color: #007bff; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; margin-top: 1rem; }
        button:hover { background-color: #0056b3; }
        .login-link { text-align: center; margin-top: 1rem; font-size: 0.85rem; }
    </style>
</head>
<body>

<div class="register-container">
    <h2>สมัครสมาชิกใหม่</h2>
    <form id="registerForm">
        <div class="form-group">
            <label>ชื่อผู้ใช้งาน (Username)</label>
            <input type="text" id="username" required>
        </div>
        <div class="form-group">
            <label>รหัสผ่าน (Password)</label>
            <input type="password" id="password" required>
        </div>
        <div class="grid">
            <div class="form-group">
                <label>ส่วนสูง (cm)</label>
                <input type="number" step="0.1" id="height" required>
            </div>
            <div class="form-group">
                <label>น้ำหนักเป้าหมาย (kg)</label>
                <input type="number" step="0.1" id="target_weight" required>
            </div>
        </div>
        <button type="submit">ยืนยันการสมัคร</button>
    </form>
    <div class="login-link">
        มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const payload = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            height: parseFloat(document.getElementById('height').value),
            target_weight: parseFloat(document.getElementById('target_weight').value)
        };

        try {
            const response = await fetch('http://localhost:5000/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert('สมัครสมาชิกสำเร็จแล้วเพื่อน! ไปลอง Login ดูนะ');
                window.location.href = 'login.html';
            } else {
                const err = await response.json();
                alert('สมัครไม่สำเร็จ: ' + err.message);
            }
        } catch (error) {
            alert('เชื่อมต่อ Server ไม่ได้ เช็คว่ารัน backend หรือยัง?');
        }
    });
</script>

</body>
</html>
